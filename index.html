function PagePlats({ data, onChange, fontFamily, setFontFamily, overlayProps }) {
  const d = data.plats;
  const updateSection = (key, newVal) => {
    onChange({ ...data, plats: { ...d, [key]: newVal }});
  };
  // v6.5 : helpers pour les configs et titres de sections
  const setSectionTitle = (sid, patch) => {
    const next = { ...data.sectionTitles, [sid]: { ...(data.sectionTitles[sid] || {}), ...patch } };
    onChange({ ...data, sectionTitles: next });
  };
  const setSectionCfg = (sid, cfg) => {
    const next = { ...data.sectionConfig };
    if (!cfg || (Object.keys(cfg).length === 0)) delete next[sid]; else next[sid] = cfg;
    onChange({ ...data, sectionConfig: next });
  };
  const reorderSection = (voletKey, src, dst) => {
    const order = [...(data.sectionOrder[voletKey] || [])];
    const i = order.indexOf(src), j = order.indexOf(dst);
    if (i < 0 || j < 0) return;
    order.splice(i, 1);
    order.splice(j, 0, src);
    onChange({ ...data, sectionOrder: { ...data.sectionOrder, [voletKey]: order }});
  };

  const updateItem = (section, idx, newItem) => {
    let arr;
    if (section === "cocktails" || section === "virgins") {
      arr = [...d[section].items];
      arr[idx] = newItem;
      updateSection(section, { ...d[section], items: arr });
    } else {
      arr = [...d[section]];
      arr[idx] = newItem;
      updateSection(section, arr);
    }
  };
  // v6.5 : add / insert / remove / move sur n'importe quelle section
  const sectionArr = (section) => (section === "cocktails" || section === "virgins") ? d[section].items : d[section];
  const setSectionArr = (section, arr) => {
    if (section === "cocktails" || section === "virgins") {
      updateSection(section, { ...d[section], items: arr });
    } else {
      updateSection(section, arr);
    }
  };
  const insertItemAt = (section, idx) => {
    const arr = sectionArr(section);
    const tpl = arr[arr.length - 1] || arr[0];
    setSectionArr(section, arrayInsert(arr, idx, blankItem(tpl)));
  };
  const removeItemAt = (section, idx) => {
    setSectionArr(section, arrayRemove(sectionArr(section), idx));
  };
  const moveItem = (section, from, to) => {
    setSectionArr(section, arrayMove(sectionArr(section), from, to));
  };

  // helper pour activer un volet au clic
  const onVoletMouseDown = (voletKey) => (e) => {
    if (e.target.closest(".overlay-item")) return;
    overlayProps.setActiveVolet(voletKey);
    overlayProps.selectOverlay(null, null);
  };

  // v6.2 : 2 layers — back (derrière contenu) et front (devant)
  const renderOverlaysBack = (voletKey) => (
    <OverlayLayer
      voletKey={voletKey}
      overlays={overlayProps.getOverlays(voletKey)}
      onUpdateOverlays={(list) => overlayProps.setOverlays(voletKey, list)}
      selectedId={overlayProps.selectedVoletKey === voletKey ? overlayProps.selectedId : null}
      onSelect={(vk, id) => overlayProps.selectOverlay(vk, id)}
      isActiveVolet={overlayProps.activeVolet === voletKey}
      layer="back"
    />
  );
  const renderOverlaysFront = (voletKey) => (
    <OverlayLayer
      voletKey={voletKey}
      overlays={overlayProps.getOverlays(voletKey)}
      onUpdateOverlays={(list) => overlayProps.setOverlays(voletKey, list)}
      selectedId={overlayProps.selectedVoletKey === voletKey ? overlayProps.selectedId : null}
      onSelect={(vk, id) => overlayProps.selectOverlay(vk, id)}
      isActiveVolet={overlayProps.activeVolet === voletKey}
      layer="front"
    />
  );
  const renderOverlays = (voletKey) => renderOverlaysFront(voletKey);

  // v6.5 : rendu d'une section par sectionId
  const renderPlatsSection = (sid, voletKey) => {
    const t = (data.sectionTitles && data.sectionTitles[sid]) || {};
    const cfg = (data.sectionConfig && data.sectionConfig[sid]) || null;
    const sectionFrameProps = {
      sectionId: sid, voletKey, cfg,
      onConfigChange: c => setSectionCfg(sid, c),
      draggable: true,
      onDrop: (src, dst) => reorderSection(voletKey, src, dst),
    };

    if (sid === "cocktails" || sid === "virgins") {
      const sec = d[sid];
      return (
        <SectionFrame key={sid} {...sectionFrameProps} className="section" style={sid === "virgins" ? {marginTop:"6px"} : {marginTop:"55px"}}>
          <div className="section-title">
            <Editable value={t.titre || ""} onChange={v => setSectionTitle(sid, { titre: v })}/>
          </div>
          <div className="price-banner">
            <Editable value={sec.prix} onChange={v => updateSection(sid, {...sec, prix: v})}/>
          </div>
          {sec.items.map((it, i) => (
            <EditableRow
              key={sid+i}
              index={i}
              total={sec.items.length}
              onDelete={() => removeItemAt(sid, i)}
              onInsertAfter={() => insertItemAt(sid, i + 1)}
              onMove={(f, t) => moveItem(sid, f, t)}
            >
              <ItemRow item={it} onChange={ni => updateItem(sid, i, ni)} showPrice={false}/>
            </EditableRow>
          ))}
          <AddRowBtn onAdd={() => insertItemAt(sid, sec.items.length)} label="Ajouter une ligne"/>
        </SectionFrame>
      );
    }
    if (sid === "tapas" || sid === "plats_principaux" || sid === "desserts") {
      const arr = d[sid];
      return (
        <React.Fragment key={sid}>
          <div className="section-title-dark">
            <Editable value={t.titre || ""} onChange={v => setSectionTitle(sid, { titre: v })}/>
          </div>
          {t.soustitre !== undefined && (
            <div className="section-subtitle">
              <Editable value={t.soustitre || ""} onChange={v => setSectionTitle(sid, { soustitre: v })}/>
            </div>
          )}
          <SectionFrame {...sectionFrameProps} className="section">
            {arr.map((it, i) => (
              <EditableRow
                key={sid+i}
                index={i}
                total={arr.length}
                onDelete={() => removeItemAt(sid, i)}
                onInsertAfter={() => insertItemAt(sid, i + 1)}
                onMove={(f, t) => moveItem(sid, f, t)}
              >
                <ItemRow item={it} onChange={ni => updateItem(sid, i, ni)}/>
              </EditableRow>
            ))}
            <AddRowBtn onAdd={() => insertItemAt(sid, arr.length)} label="Ajouter une ligne"/>
          </SectionFrame>
        </React.Fragment>
      );
    }
    return null;
  };

  return (
    <div className="page page-plats">
      {/* VOLET 1 : COCKTAILS + VIRGINS (fond blanc) */}
      <div className={"volet v-white" + (overlayProps.activeVolet === "plats_v1" ? " active-volet" : "")} onMouseDown={onVoletMouseDown("plats_v1")}>
        {renderOverlaysBack("plats_v1")}
        <div className="hachures"></div>
        <img src={LOGO_CHAT} className="logo-chat" alt="chat"/>
        {(data.sectionOrder.plats_v1 || []).map(sid => renderPlatsSection(sid, "plats_v1"))}
        {renderOverlays("plats_v1")}
      </div>

      {/* VOLET 2 : TAPAS + PLATS + DESSERTS (fond noir) */}
      <div className={"volet v-black" + (overlayProps.activeVolet === "plats_v2" ? " active-volet" : "")} onMouseDown={onVoletMouseDown("plats_v2")}>
        {renderOverlaysBack("plats_v2")}
        {(data.sectionOrder.plats_v2 || []).map(sid => renderPlatsSection(sid, "plats_v2"))}

        <div className="font-picker-inline">
          <span>Police :</span>
          <select value={fontFamily} onChange={e => setFontFamily(e.target.value)}>
            {FONT_OPTIONS.map(f => (
              <option key={f.value} value={f.value}>{f.label}</option>
            ))}
          </select>
        </div>

        <div className="footer-mentions-v2">
          <Editable value={d.footer} onChange={v => updateSection("footer", v)} multiline/>
        </div>
        {renderOverlays("plats_v2")}
      </div>

      {/* VOLET 3 : COUVERTURE (fond noir, logo texte + panthère) */}
      <div className={"volet v-black volet-couverture" + (overlayProps.activeVolet === "plats_v3" ? " active-volet" : "")} onMouseDown={onVoletMouseDown("plats_v3")}>
        {renderOverlaysBack("plats_v3")}
        <img src={LOGO_TEXTE} className="logo-texte" alt="The Black Cat"/>
        <img src={LOGO_PANTH} className="logo-panth" alt="panthère"/>
        {renderOverlays("plats_v3")}
      </div>
    </div>
  );
}

// ============ PAGE 2 : BOISSONS ============
function PageBoissons({ data, onChange, overlayProps }) {
  const d = data.boissons;
  const update = (key, val) => onChange({ ...data, boissons: { ...d, [key]: val }});
  const updateItem = (key, idx, ni) => {
    const arr = [...d[key]];
    arr[idx] = ni;
    update(key, arr);
  };

  // v6.5 helpers titres / configs / ordre
  const setSectionTitle = (sid, patch) => {
    const next = { ...data.sectionTitles, [sid]: { ...(data.sectionTitles[sid] || {}), ...patch } };
    onChange({ ...data, sectionTitles: next });
  };
  const setSectionCfg = (sid, cfg) => {
    const next = { ...data.sectionConfig };
    if (!cfg || (Object.keys(cfg).length === 0)) delete next[sid]; else next[sid] = cfg;
    onChange({ ...data, sectionConfig: next });
  };
  const reorderSection = (voletKey, src, dst) => {
    const order = [...(data.sectionOrder[voletKey] || [])];
    const i = order.indexOf(src), j = order.indexOf(dst);
    if (i < 0 || j < 0) return;
    order.splice(i, 1);
    order.splice(j, 0, src);
    onChange({ ...data, sectionOrder: { ...data.sectionOrder, [voletKey]: order }});
  };

  // v6.5 add / insert / remove / move pour les sections boissons
  // Map sectionId -> chemin dans data.boissons
  const SECTION_PATHS = {
    chaudes: "chaudes", softs: "softs", apero: "apero",
    bieres_pression: "bieres_pression", bieres_bouteilles: "bieres_bouteilles",
    shots: "shots", mixer: "mixer", spritz: "spritz",
    vins: null, // groupe parent — pas de tableau direct
    vins_blanc: ["vins","blanc"], vins_rouge: ["vins","rouge"], vins_rose: ["vins","rose"],
    rhums_arranges: ["rhums_arranges","items"],
  };
  const getArr = (sid) => {
    const p = SECTION_PATHS[sid];
    if (!p) return [];
    if (typeof p === "string") return d[p] || [];
    return (d[p[0]] && d[p[0]][p[1]]) || [];
  };
  const setArr = (sid, arr) => {
    const p = SECTION_PATHS[sid];
    if (!p) return;
    if (typeof p === "string") update(p, arr);
    else update(p[0], { ...d[p[0]], [p[1]]: arr });
  };
  const insertItem = (sid, idx) => {
    const arr = getArr(sid);
    const tpl = arr[arr.length - 1] || arr[0];
    let blank;
    if (sid === "rhums_arranges") {
      blank = "";
    } else if (sid === "shots") {
      // [v6_8] Garantir un template complet pour shots même si arr vide ou tpl partiel
      blank = { nom: "", prix: "", metre: "" };
    } else if (sid === "mixer" || sid === "spritz" || sid === "softs" || sid === "apero" || sid === "chaudes") {
      blank = { nom: "", prix: "" };
    } else {
      blank = blankItem(tpl);
    }
    setArr(sid, arrayInsert(arr, idx, blank));
  };
  const removeItem = (sid, idx) => setArr(sid, arrayRemove(getArr(sid), idx));
  const moveItem = (sid, from, to) => setArr(sid, arrayMove(getArr(sid), from, to));
  const updateItemInSection = (sid, idx, ni) => {
    const arr = [...getArr(sid)];
    arr[idx] = ni;
    setArr(sid, arr);
  };

  const onVoletMouseDown = (voletKey) => (e) => {
    if (e.target.closest(".overlay-item")) return;
    overlayProps.setActiveVolet(voletKey);
    overlayProps.selectOverlay(null, null);
  };
  const renderOverlaysBack = (voletKey) => (
    <OverlayLayer
      voletKey={voletKey}
      overlays={overlayProps.getOverlays(voletKey)}
      onUpdateOverlays={(list) => overlayProps.setOverlays(voletKey, list)}
      selectedId={overlayProps.selectedVoletKey === voletKey ? overlayProps.selectedId : null}
      onSelect={(vk, id) => overlayProps.selectOverlay(vk, id)}
      isActiveVolet={overlayProps.activeVolet === voletKey}
      layer="back"
    />
  );
  const renderOverlaysFront = (voletKey) => (
    <OverlayLayer
      voletKey={voletKey}
      overlays={overlayProps.getOverlays(voletKey)}
      onUpdateOverlays={(list) => overlayProps.setOverlays(voletKey, list)}
      selectedId={overlayProps.selectedVoletKey === voletKey ? overlayProps.selectedId : null}
      onSelect={(vk, id) => overlayProps.selectOverlay(vk, id)}
      isActiveVolet={overlayProps.activeVolet === voletKey}
      layer="front"
    />
  );

  // Helper : props communes au SectionFrame
  const sfProps = (sid, voletKey) => ({
    sectionId: sid, voletKey,
    cfg: (data.sectionConfig && data.sectionConfig[sid]) || null,
    onConfigChange: c => setSectionCfg(sid, c),
    draggable: true,
    onDrop: (src, dst) => reorderSection(voletKey, src, dst),
  });
  const titleOf = (sid) => (data.sectionTitles && data.sectionTitles[sid] && data.sectionTitles[sid].titre) || "";

  // Renderer générique pour sections "compactes" (chaudes, softs, apero, mixer, spritz, bouteilles)
  const renderCompactSection = (sid, voletKey) => {
    const arr = getArr(sid);
    return (
      <SectionFrame key={sid} {...sfProps(sid, voletKey)}>
        <div className="col-title">
          <Editable value={titleOf(sid)} onChange={v => setSectionTitle(sid, { titre: v })}/>
        </div>
        {arr.map((it, i) => (
          <EditableRow
            key={sid+i} index={i} total={arr.length}
            onDelete={() => removeItem(sid, i)}
            onInsertAfter={() => insertItem(sid, i+1)}
            onMove={(f,t) => moveItem(sid, f, t)}
          >
            <div className="item-compact">
              <Editable className="name" value={it.nom} onChange={v => updateItemInSection(sid, i, {...it, nom: v})}/>
              <Editable className="price" value={it.prix} onChange={v => updateItemInSection(sid, i, {...it, prix: v})}/>
            </div>
          </EditableRow>
        ))}
        <AddRowBtn onAdd={() => insertItem(sid, arr.length)}/>
      </SectionFrame>
    );
  };

  // Renderer pour vins (blanc/rouge/rose) — chaque sous-bloc devient sa propre section

// ============ APP PRINCIPALE ============
const FONT_OPTIONS = [
  { label: "Arial", value: "Arial, sans-serif" },
  { label: "Helvetica", value: "Helvetica, Arial, sans-serif" },
  { label: "Georgia", value: "Georgia, serif" },
  { label: "Playfair Display", value: "'Playfair Display', Georgia, serif" },
  { label: "Montserrat", value: "'Montserrat', Arial, sans-serif" },
  { label: "Bebas Neue", value: "'Bebas Neue', Impact, sans-serif" },
  { label: "Oswald", value: "'Oswald', Arial, sans-serif" },
  { label: "Roboto", value: "'Roboto', Arial, sans-serif" },
  { label: "Caveat (manuscrit)", value: "'Caveat', cursive" },
  { label: "Permanent Marker", value: "'Permanent Marker', Impact, sans-serif" },
];

function App() {
  const { data, save, undo, reset, history, saveStatus } = useCarteData();
  const [tab, setTab] = React.useState("plats");
  const [previewMode, setPreviewMode] = React.useState(false);
  const [fbEnabled, setFbEnabled] = React.useState(() => localStorage.getItem("bc_fb_enabled") === "1");
  const fontFamily = data.fontFamily || "Arial, sans-serif";
  const setFontFamily = (f) => handleChange({ ...data, fontFamily: f });
  const [modal, setModal] = React.useState(null);
  const [toast, setToast] = React.useState("");
  const fileInputRef = React.useRef(null);

  // Sync Firebase optionnelle
  const fbDb = React.useMemo(() => {
    if (!fbEnabled) return null;
    try {
      if (!window.firebase.apps.length) {
        window.firebase.initializeApp(FIREBASE_CONFIG);
      }
      return window.firebase.database();
    } catch(e) {
      console.error("Firebase init error:", e);
      return null;
    }
  }, [fbEnabled]);

  // Écoute Firebase
  React.useEffect(() => {
    if (!fbDb) return;
    const ref = fbDb.ref(FIREBASE_PATH);
    const handler = ref.on("value", (snap) => {
      const remote = snap.val();
      if (remote && remote.meta && remote.meta.derniere_maj) {
        const remoteTime = new Date(remote.meta.derniere_maj).getTime();
        const localTime = data.meta && data.meta.derniere_maj ? new Date(data.meta.derniere_maj).getTime() : 0;
        if (remoteTime > localTime + 1000) {
          save(migrateData(remote), true);
          setToast("Synchronisé depuis un autre appareil");
          setTimeout(() => setToast(""), 2500);
        }
      }
    });
    return () => ref.off("value", handler);
  }, [fbDb]);

  const handleChange = (newData) => {
    save(newData);
    if (fbDb) {
      fbDb.ref(FIREBASE_PATH).set(newData).catch(e => console.error("Firebase save error:", e));
    }
  };

  // Raccourci Ctrl+Z
  React.useEffect(() => {
    const onKey = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "z" && !previewMode) {
        e.preventDefault();
        if (undo()) {
          setToast("Annulé");
          setTimeout(() => setToast(""), 1200);
        } else {
          setToast("Rien à annuler");
          setTimeout(() => setToast(""), 1200);
        }
      }
    };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [undo, previewMode]);

  // Toggle preview
  React.useEffect(() => {
    document.body.classList.toggle("preview", previewMode);
  }, [previewMode]);

  const handleExport = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const d = new Date();
    a.href = url;
    a.download = `carte_blackcat_${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2,'0')}${d.getDate().toString().padStart(2,'0')}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setToast("Export JSON téléchargé");
    setTimeout(() => setToast(""), 2000);
  };

  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (parsed.plats && parsed.boissons) {
          save(migrateData(parsed));
          setToast("Carte importée");
          setTimeout(() => setToast(""), 2000);
        } else {
          alert("Fichier JSON invalide (structure plats/boissons manquante)");
        }
      } catch(err) {
        alert("Erreur lecture JSON : " + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const handleReset = () => {
    setModal({
      title: "Réinitialiser la carte ?",
      text: "Toutes tes modifications seront perdues et la carte sera remise à l'état d'origine (Avril 2026). Cette action est irréversible.",
      onConfirm: () => {
        reset();
        setModal(null);
        setToast("Carte réinitialisée");
        setTimeout(() => setToast(""), 2000);
      }
    });
  };

  const handleFirebaseToggle = (e) => {
    const enabled = e.target.checked;
    setFbEnabled(enabled);
    localStorage.setItem("bc_fb_enabled", enabled ? "1" : "0");
    setToast(enabled ? "Synchronisation Firebase activée" : "Synchronisation Firebase désactivée");
    setTimeout(() => setToast(""), 2500);
  };

  const handlePrint = () => {
    window.print();
  };

  const [exportingPNG, setExportingPNG] = React.useState(false);
  const [showTextScalePanel, setShowTextScalePanel] = React.useState(false); // v6.2

  // ============ OVERLAYS : états et handlers ============
  const [activeVolet, setActiveVolet] = React.useState(null);
  const [selectedVoletKey, setSelectedVoletKey] = React.useState(null);
  const [selectedId, setSelectedId] = React.useState(null);
  const imageInputRef = React.useRef(null);

  const getOverlays = (voletKey) => (data.overlays && data.overlays[voletKey]) || [];
  const setOverlays = (voletKey, list) => {
    const newOverlays = { ...(data.overlays || {}), [voletKey]: list };
    handleChange({ ...data, overlays: newOverlays });
  };
  const selectOverlay = (voletKey, id) => {
    setSelectedVoletKey(voletKey);
    setSelectedId(id);
  };

  const selectedOverlay = React.useMemo(() => {
    if (!selectedVoletKey || !selectedId) return null;
    const list = getOverlays(selectedVoletKey);
    return list.find(o => o.id === selectedId) || null;
  }, [selectedVoletKey, selectedId, data.overlays]);

  // Génère un uid (même fonction que OverlayLayer)
  const genUid = () => "ov_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 7);

  // Trouver le volet actif par défaut pour insertion (si aucun, premier volet de la page actuelle)
  const getInsertionVoletKey = () => {
    if (activeVolet) return activeVolet;
    return tab === "plats" ? "plats_v1" : "boissons_v1";
  };

  const handleAddText = () => {
    const voletKey = getInsertionVoletKey();
    const list = getOverlays(voletKey);
    const maxZ = list.reduce((m, o) => Math.max(m, o.zIndex || 10), 10);
    const newOv = {
      id: genUid(),
      type: "text",
      x: 80, y: 80, width: 200, height: 60,
      content: "Texte libre",
      fontFamily: "",
      fontSize: 16,
      fontWeight: "normal",
      color: "#000000",
      textAlign: "left",
      lineHeight: 1.3,
      letterSpacing: 0,
      zIndex: maxZ + 1,
    };
    setOverlays(voletKey, [...list, newOv]);
    setActiveVolet(voletKey);
    selectOverlay(voletKey, newOv.id);
    setToast(`Zone de texte ajoutée sur ${voletKey.replace("_", " vol.")}`);
    setTimeout(() => setToast(""), 1800);
  };

  const handleAddImageClick = () => {
    imageInputRef.current.click();
  };

  const handleImageFileChange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith("image/")) {
      alert("Ce fichier n'est pas une image.");
      return;
    }
    try {
      const dataUrl = await compressImage(file, 1200, 0.82);
      const voletKey = getInsertionVoletKey();
      const list = getOverlays(voletKey);
      const maxZ = list.reduce((m, o) => Math.max(m, o.zIndex || 10), 10);
      // Détermine les dimensions initiales à partir de l'image
      const img = new Image();
      img.onload = () => {
        const ratio = img.width / img.height;
        let w = 180, h = Math.round(180 / ratio);
        if (h > 240) { h = 240; w = Math.round(240 * ratio); }
        const newOv = {
          id: genUid(),
          type: "image",
          x: 60, y: 60,
          width: w, height: h,
          src: dataUrl,
          zIndex: maxZ + 1,
        };
        setOverlays(voletKey, [...list, newOv]);
        setActiveVolet(voletKey);
        selectOverlay(voletKey, newOv.id);
        setToast(`Image ajoutée sur ${voletKey.replace("_", " vol.")}`);
        setTimeout(() => setToast(""), 1800);
      };
      img.src = dataUrl;
    } catch (err) {
      alert("Erreur import image : " + err.message);
    }
    e.target.value = "";
  };

  const handleUpdateOverlay = (patch) => {
    if (!selectedVoletKey || !selectedId) return;
    const list = getOverlays(selectedVoletKey);
    setOverlays(selectedVoletKey, list.map(o => o.id === selectedId ? { ...o, ...patch } : o));
  };

  const handleDeleteOverlay = () => {
    if (!selectedVoletKey || !selectedId) return;
    const list = getOverlays(selectedVoletKey);
    setOverlays(selectedVoletKey, list.filter(o => o.id !== selectedId));
    selectOverlay(null, null);
    setToast("Élément supprimé");
    setTimeout(() => setToast(""), 1500);
  };

  const handleBringFront = () => {
    if (!selectedVoletKey || !selectedId) return;
    const list = getOverlays(selectedVoletKey);
    const maxZ = list.reduce((m, o) => Math.max(m, o.zIndex || 10), 10);
    setOverlays(selectedVoletKey, list.map(o => o.id === selectedId ? { ...o, zIndex: maxZ + 1 } : o));
  };

  const handleSendBack = () => {
    if (!selectedVoletKey || !selectedId) return;
    const list = getOverlays(selectedVoletKey);
    const minZ = list.reduce((m, o) => Math.min(m, o.zIndex || 10), 10);
    setOverlays(selectedVoletKey, list.map(o => o.id === selectedId ? { ...o, zIndex: minZ - 1 } : o));
  };

  // === v6.2 : changer le plan (back/front) d'un overlay ===
  const handleSetLayer = (newLayer) => {
    if (!selectedVoletKey || !selectedId) return;
    const list = getOverlays(selectedVoletKey);
    setOverlays(selectedVoletKey, list.map(o => o.id === selectedId ? { ...o, layer: newLayer } : o));
  };
  // === v6.2 : Échelles de textes carte (5 sliders globaux) ===
  // Stocké dans data.textScales = { titre, sousTitre, nom, desc, prix }
  // Multiplicateur en pourcentage (70 à 150). Défaut 100.
  const DEFAULT_TEXT_SCALES = { titre: 100, sousTitre: 100, nom: 100, desc: 100, prix: 100 };
  const getTextScales = () => ({ ...DEFAULT_TEXT_SCALES, ...(data.textScales || {}) });
  const handleSetTextScale = (key, value) => {
    const cur = getTextScales();
    const newScales = { ...cur, [key]: value };
    handleChange({ ...data, textScales: newScales });
  };
  const handleResetTextScales = () => {
    handleChange({ ...data, textScales: { ...DEFAULT_TEXT_SCALES } });
  };
  const textScales = getTextScales();


  // Raccourcis clavier overlays
  React.useEffect(() => {
    const onKey = (e) => {
      if (previewMode) return;
      // Ignorer si on est dans un input/contenteditable
      const t = e.target;
      const inField = t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.tagName === "SELECT" || t.getAttribute("contenteditable") === "true");
      if (e.key === "Escape") {
        selectOverlay(null, null);
        return;
      }
      if ((e.key === "Delete" || e.key === "Backspace") && selectedId && !inField) {
        e.preventDefault();
        handleDeleteOverlay();
      }
    };
    document.addEventListener("keydown", onKey);
    return () => document.removeEventListener("keydown", onKey);
  }, [selectedId, selectedVoletKey, previewMode, data.overlays]);

  // objet à passer aux composants de page
  const overlayProps = {
    activeVolet,
    setActiveVolet,
    selectedVoletKey,
    selectedId,
    selectOverlay,
    getOverlays,
    setOverlays,
    onSetLayer: handleSetLayer,
  };

  const handleExportPNG = async () => {
    if (typeof html2canvas === "undefined") {
      alert("La bibliothèque d'export PNG n'a pas pu être chargée. Vérifie ta connexion internet.");
      return;
    }
    setExportingPNG(true);
    setToast("Génération des images en cours...");

    // Force le mode aperçu temporairement pour un rendu propre
    const wasPreview = previewMode;
    setPreviewMode(true);
    await new Promise(r => setTimeout(r, 300));

    try {
      const volets = document.querySelectorAll(".page .volet");
      const pageName = tab === "plats" ? "plats" : "boissons";
      let idx = 1;
      for (const volet of volets) {
        setToast(`Export volet ${idx}/${volets.length}...`);
        const canvas = await html2canvas(volet, {
          scale: 3, // Haute résolution
          backgroundColor: null,
          logging: false,
          useCORS: true
        });
        const dataUrl = canvas.toDataURL("image/png");
        const link = document.createElement("a");
        link.href = dataUrl;
        link.download = `blackcat_${pageName}_volet${idx}.png`;
        link.click();
        await new Promise(r => setTimeout(r, 400));
        idx++;
      }
      setToast(`${volets.length} images PNG téléchargées`);
      setTimeout(() => setToast(""), 3000);
    } catch (err) {
      console.error(err);
      alert("Erreur export PNG : " + err.message);
      setToast("");
    } finally {
      setPreviewMode(wasPreview);
      setExportingPNG(false);
    }
  };

  return (
    <>
      <EditableToolbarHost previewMode={previewMode}/>
      <div className="toolbar">
        <h1>🐾 THE BLACK CAT — ÉDITEUR DE CARTE v6.8</h1>
        <button onClick={handlePrint}>🖨 Imprimer / PDF</button>
        <button onClick={handleExportPNG} disabled={exportingPNG} title="Export 3 images PNG haute résolution, une par volet (pour import Canva)">
          {exportingPNG ? "⏳ Export..." : "🖼 Export PNG"}
        </button>
        <button onClick={handleAddText} title="Ajouter une zone de texte libre sur le volet actif">
          ＋ Texte
        </button>
        <button onClick={handleAddImageClick} title="Ajouter une image sur le volet actif">
          ＋ Image
        </button>
        <input type="file" ref={imageInputRef} accept="image/*" style={{display:"none"}} onChange={handleImageFileChange}/>
        <button onClick={() => setPreviewMode(!previewMode)} className={previewMode ? "active" : ""}>
          {previewMode ? "✎ Édition" : "👁 Aperçu"}
        </button>
        <button onClick={() => setShowTextScalePanel(s => !s)} className={showTextScalePanel ? "active" : ""} title="Régler la taille des textes de la carte (titres, items, prix...)">
          🔠 Échelles
        </button>
        <button onClick={() => undo() ? (setToast("Annulé"), setTimeout(()=>setToast(""),1200)) : (setToast("Rien à annuler"), setTimeout(()=>setToast(""),1200))} disabled={history.length === 0}>
          ↶ Annuler
        </button>
        <button onClick={handleExport}>⬇ Export JSON</button>
        <button onClick={() => fileInputRef.current.click()}>⬆ Import JSON</button>
        <input type="file" ref={fileInputRef} accept=".json" style={{display:"none"}} onChange={handleImport}/>
        <button className="danger" onClick={handleReset}>↺ Réinitialiser</button>
        <label>
          <input type="checkbox" checked={fbEnabled} onChange={handleFirebaseToggle}/>
          Sync Firebase
        </label>
        <div className="spacer"></div>
        <span className="status">{saveStatus}</span>
      </div>

      <div className="tabs">
        <button className={"tab " + (tab === "plats" ? "active" : "")} onClick={() => { setTab("plats"); selectOverlay(null, null); setActiveVolet(null); }}>
          CARTE PLATS
        </button>
        <button className={"tab " + (tab === "boissons" ? "active" : "")} onClick={() => { setTab("boissons"); selectOverlay(null, null); setActiveVolet(null); }}>
          CARTE BOISSONS
        </button>
      </div>

      <div className="page-wrapper" style={{fontFamily: fontFamily}}>
        {/* v6.4 : injection conditionnelle. Si tous les sliders sont à 100% (±1%),
            on n'injecte rien — le CSS d'origine reste intact (pas d'override !important).
            Sinon, on calcule sur les VRAIES tailles natives du v6_1 (lignes 166-225). */}
        {(() => {
          const inDefault = (s) => s >= 99 && s <= 101;
          const allDefault = inDefault(textScales.titre)
                          && inDefault(textScales.sousTitre)
                          && inDefault(textScales.nom)
                          && inDefault(textScales.desc)
                          && inDefault(textScales.prix);
          if (allDefault) return null;
          // Tailles natives (v6_1 source CSS, lignes 166-225)
          const NATIVE = {
            sectionTitle:     18,  // .section-title
            sectionTitleDark: 16,  // .section-title-dark
            sectionSubtitle:   8,  // .section-subtitle
            priceBanner:      16,  // .price-banner
            item:              9,  // .item (base)
            itemName:          9,  // .item-name
            itemPrefix:        9,  // .item-prefix (hérite item)
            itemDesc:          8,  // .item-desc
            itemPrice:        10,  // .item-price
          };
          const sT  = textScales.titre     / 100;
          const sST = textScales.sousTitre / 100;
          const sN  = textScales.nom       / 100;
          const sD  = textScales.desc      / 100;
          const sP  = textScales.prix      / 100;
          const fmt = (n) => Number(n.toFixed(2));
          return (
            <style>{`
              .page-wrapper .section-title      { font-size: ${fmt(NATIVE.sectionTitle * sT)}px !important; }
              .page-wrapper .section-title-dark { font-size: ${fmt(NATIVE.sectionTitleDark * sT)}px !important; }
              .page-wrapper .section-subtitle   { font-size: ${fmt(NATIVE.sectionSubtitle * sST)}px !important; }
              .page-wrapper .price-banner       { font-size: ${fmt(NATIVE.priceBanner * sP)}px !important; }
              .page-wrapper .item               { font-size: ${fmt(NATIVE.item * sN)}px !important; }
              .page-wrapper .item-name          { font-size: ${fmt(NATIVE.itemName * sN)}px !important; }
              .page-wrapper .item-prefix        { font-size: ${fmt(NATIVE.itemPrefix * sN)}px !important; }
              .page-wrapper .item-desc          { font-size: ${fmt(NATIVE.itemDesc * sD)}px !important; }
              .page-wrapper .item-price         { font-size: ${fmt(NATIVE.itemPrice * sP)}px !important; }
            `}</style>
          );
        })()}
        {tab === "plats" && <PagePlats data={data} onChange={handleChange} fontFamily={fontFamily} setFontFamily={setFontFamily} overlayProps={overlayProps}/>}
        {tab === "boissons" && <PageBoissons data={data} onChange={handleChange} overlayProps={overlayProps}/>}
      </div>

      {selectedOverlay && !previewMode && (
        <OverlayProps
          overlay={selectedOverlay}
          onUpdate={handleUpdateOverlay}
          onDelete={handleDeleteOverlay}
          onBringFront={handleBringFront}
          onSendBack={handleSendBack}
          onSetLayer={handleSetLayer}
          fontOptions={FONT_OPTIONS}
          layerPanel={
            <LayerPanel
              voletKey={selectedVoletKey}
              overlays={selectedVoletKey ? getOverlays(selectedVoletKey) : []}
              selectedId={selectedId}
              onSelect={(vk, id) => selectOverlay(vk, id)}
            />
          }
        />
      )}

      {showTextScalePanel && !previewMode && (
        <div className="text-scale-panel">
          <h4>Tailles des textes carte</h4>
          {[
            { key: "titre", label: "Titres sections" },
            { key: "sousTitre", label: "Sous-titres" },
            { key: "nom", label: "Noms des plats" },
            { key: "desc", label: "Descriptions" },
            { key: "prix", label: "Prix" },
          ].map(({ key, label }) => (
            <div className="ts-row" key={key}>
              <label>{label}</label>
              <input
                type="range"
                min="70"
                max="150"
                step="5"
                value={textScales[key]}
                onChange={e => handleSetTextScale(key, parseInt(e.target.value))}
              />
              <span className="ts-val">{textScales[key]}%</span>
            </div>
          ))}
          <div className="ts-actions">
            <button onClick={handleResetTextScales} title="Remettre à 100%">↺ Reset</button>
            <button className="close" onClick={() => setShowTextScalePanel(false)}>Fermer</button>
          </div>
        </div>
      )}

      {modal && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>{modal.title}</h3>
            <p>{modal.text}</p>
            <div className="actions">
              <button className="btn-cancel" onClick={() => setModal(null)}>Annuler</button>
              <button className="btn-confirm" onClick={modal.onConfirm}>Confirmer</button>
            </div>
          </div>
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
